name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Lint Python
        run: pixi run lint-python

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Create CI test env file
        env:
          CI_SUPABASE_URL_TEST: ${{ secrets.SUPABASE_URL_TEST }}
          CI_SUPABASE_KEY_TEST: ${{ secrets.SUPABASE_KEY_TEST }}
          CI_SUPABASE_ANON_KEY_TEST: ${{ secrets.SUPABASE_ANON_KEY_TEST }}
        run: |
          # Fail fast with clear guidance when required secrets are unavailable.
          if [ -z "$CI_SUPABASE_URL_TEST" ] || [ -z "$CI_SUPABASE_KEY_TEST" ]; then
            echo "::error::Missing Supabase CI secrets. Configure SUPABASE_URL_TEST and SUPABASE_KEY_TEST as repository secrets."
            exit 1
          fi

          {
            echo "SECRET_KEY=test-secret-key-for-ci"
            echo "TEST_MODE=true"
            echo "ENVIRONMENT=development"
            echo "SUPABASE_URL=$CI_SUPABASE_URL_TEST"
            echo "SUPABASE_KEY=$CI_SUPABASE_KEY_TEST"
            echo "SUPABASE_ANON_KEY=$CI_SUPABASE_ANON_KEY_TEST"
          } > .env.test

      - name: Run tests
        run: pixi run test