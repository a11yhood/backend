name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Lint Python
        run: pixi run lint-python

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.66.0
          post-cleanup: false

      - name: Create CI test env file
        env:
          CI_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CI_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CI_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ ! -f .env.test ]; then
            {
              echo "SECRET_KEY=test-secret-key-for-ci"
              echo "TEST_MODE=true"
              echo "ENVIRONMENT=development"
            } > .env.test

            if [ -n "$CI_SUPABASE_URL" ] && [ -n "$CI_SUPABASE_KEY" ]; then
              {
                echo "SUPABASE_URL=$CI_SUPABASE_URL"
                echo "SUPABASE_KEY=$CI_SUPABASE_KEY"
                if [ -n "$CI_SUPABASE_ANON_KEY" ]; then
                  echo "SUPABASE_ANON_KEY=$CI_SUPABASE_ANON_KEY"
                fi
              } >> .env.test
            fi
          fi

      - name: Run tests
        run: pixi run test