name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.21.1
          post-cleanup: false

      - name: Lint Python
        run: pixi run lint-python

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.21.1
          post-cleanup: false

      - name: Create CI test env file
        run: |
          if [ ! -f .env.test ]; then
            cat > .env.test << 'EOF'
            SUPABASE_URL=https://example.supabase.co
            SUPABASE_KEY=test-service-role-key
            SUPABASE_ANON_KEY=test-anon-key
            SECRET_KEY=test-secret-key-for-ci
            TEST_MODE=true
            ENVIRONMENT=development
            EOF
          fi

      - name: Run tests
        run: pixi run test