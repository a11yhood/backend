[workspace]
authors = ["tonyfast <tony.fast@uw.edu>"]
channels = ["conda-forge"]
name = "a11yhood-backend"
platforms = ["osx-arm64", "osx-64", "linux-64"]
version = "0.1.0"

[environments]
test = {features = ["test", "default"] }
db = {features = ["db"] }

[feature.test.tasks.test]
description = "run the test suite"
cmd = "pytest"

[feature.test.tasks.test.env]
ENV_FILE = ".env.test"

[tasks.dev]
description = "Start dev backend in Docker using Supabase test env on port 8002"
cmd = "./scripts/start-dev.sh --port 8002"

[tasks.dev-seed]
description = "Start dev backend in Docker and seed Supabase test data"
cmd = "./scripts/start-dev.sh --seed --port 8002"

[tasks.dev-reset]
description = "Start dev backend in Docker and reset Supabase test data"
cmd = "./scripts/start-dev.sh --reset-db --port 8002"

[tasks.dev-stop]
description = "Stop dev backend Docker container"
cmd = "docker stop a11yhood-backend-dev && docker rm a11yhood-backend-dev || true"

[tasks.prod]
description = "Start prod backend in Docker using .env on port 8001"
cmd = "./scripts/start-prod.sh"

[tasks.prod-stop]
description = "Stop prod backend Docker container"
cmd = "docker stop a11yhood-backend-prod && docker rm a11yhood-backend-prod || true"

[tasks.apply-migrations]
description = "Apply SQL migrations to Supabase/Postgres (uses .env.test by default)"
cmd = "./scripts/apply-migrations.sh"

[tasks.apply-migrations-prod]
description = "Apply SQL migrations to production Supabase (uses .env)"
cmd = "./scripts/apply-migrations.sh --env-file .env"

[tasks.seed]
description = "Run seed scripts (auto-detects Docker container or runs locally)"
cmd = "./scripts/seed.sh"

[tasks.seed-list]
description = "List available seed scripts"
cmd = "./scripts/seed.sh --list"

[tasks.export-public]
description = "Export public products dataset (no user data)"
cmd = "python scripts/db-export/export_full_database.py --mode public --env-file .env --output supabase/public-products.sql"

[tasks.export-private]
description = "Export full private database dump (⚠️ sensitive)"
cmd = "python scripts/db-export/export_full_database.py --mode private --output supabase/full-database.sql"

[tasks.export-test]
description = "Export test database with seed data"
cmd = "python scripts/db-export/export_full_database.py --mode test --output supabase/seed-test.sql --include-seed-output"

[tasks.validate-exports]
description = "Validate public and private exports: schema, privacy rules, and live source row counts"
cmd = "python scripts/db-export/validate_exports_schema.py"

[tasks.verify-export-restore]
description = "Verify exports can be restored into local Postgres"
cmd = "bash scripts/db-export/verify_restore_local.sh"

[tasks.serve]
description = "serve the a11yhood application from supabase"
cmd = "python -m uvicorn main:app --host 127.0.0.1 --port 8000 --workers 4"


[tasks.serve.env]
# DATABASE_URL = "sqlite:///./test.db"
ENV_FILE = ".env.test"
ENVIRONMENT = "development" 

